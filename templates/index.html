<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>GitLocal-Go</title>
    <script>
        const savedTheme = localStorage.getItem('gitlocal_theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100vh; overflow: hidden !important; margin: 0; }
        body.container { display: flex; flex-direction: column; max-width: 800px; padding-top: 4rem; padding-bottom: 4rem; }
        h1, .card { flex-shrink: 0; }
        
        /* 🌟 修正：拔除寫死的 #fff，改用 Bootstrap 的自動變數 */
        .list-group { flex: 1; overflow-y: auto; border: 1px solid var(--bs-border-color); border-radius: 0.375rem; background-color: var(--bs-body-bg); }
        .list-group-item { border-left: none; border-right: none; background-color: transparent; color: var(--bs-body-color); }
        .list-group-item:first-child { border-top: none; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bs-secondary-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="container">
    <h1 class="mb-4 fw-bold">🗂️ 我的本地倉庫清單</h1>
    <div class="card mb-4 shadow-sm border-secondary border-opacity-25">
        <div class="card-body bg-body-tertiary">
            <form action="/create_repo" method="POST" class="d-flex">
                <input type="text" name="repo_name" class="form-control border-success me-2" placeholder="輸入新專案名稱 (例如: my_new_app)" required>
                <button type="submit" class="btn btn-success fw-bold text-nowrap">➕ 建立新倉庫</button>
            </form>
        </div>
    </div>
    <div class="list-group shadow-sm">
        {{ range .repos }}
            <a href="/repo/{{ . }}" class="list-group-item list-group-item-action fs-5 py-2 fw-semibold">📁 {{ . }}</a>
        {{ else }}
            <div class="p-4 text-center text-muted">目前沒有偵測到 Git 倉庫。請在上方建立。</div>
        {{ end }}
    </div>
</body>
</html>
